<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direktiva / UB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --apple-blue:#007AFF;
  --glass:rgba(255,255,255,0.82);
  --stroke:rgba(2,6,23,0.08);
  --shadow:0 24px 70px rgba(15,23,42,0.12);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;
  background:#f5f6f8;
  color:#0f172a;
  padding:24px 20px;
}
.wrap{
  max-width:900px;
  margin:0 auto;
}
.card{
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  box-shadow:none;
  padding:24px;
}
h1{
  font-size:clamp(1.4rem,3vw,2rem);
  font-weight:800;
  letter-spacing:-0.3px;
  margin-bottom:8px;
}
p{
  color:#64748b;
  margin-bottom:18px;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-weight:600;
  color:#0f172a;
  background:#eef2ff;
  padding:6px 10px;
  border-radius:8px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="pill">Direktiva / UB</div>
    <h1>Dokumente dhe Direktiva</h1>
    <p>Kjo faqe eshte gati per permbajtje. Mund te shtojme tekste, PDF, ose lidhje direkte.</p>
  </div>
</div>
</body>
</html>
