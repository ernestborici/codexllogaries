<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llogaritesi i pages nga BRUTO/NETO 2026</title>


<style>
/* FONT UNIFY */
*{font-family:var(--font) !important;}

/* TYPOGRAPHY */
:root{--title-size:clamp(1.85rem,3vw,2.45rem);--subtitle-size:1.02rem;--body-size:0.96rem;--line:1.55;--heading-weight:700;--label-weight:600;--title-tracking:-0.3px;--label-tracking:0.2px;}
body{font-size:var(--body-size);line-height:var(--line);} 
.page-title{font-size:var(--title-size);font-weight:var(--heading-weight);letter-spacing:var(--title-tracking);color:var(--text,#0f172a);} 
.page-subtitle{font-size:var(--subtitle-size);font-weight:500;color:var(--muted,#6b7280);line-height:1.6;}
label{font-size:0.82rem;font-weight:var(--label-weight);color:var(--muted,#6b7280);letter-spacing:var(--label-tracking);} 
input,select,textarea,button{font-size:0.95rem;}
 table th{font-size:0.8rem;font-weight:600;letter-spacing:0.2px;color:#111827;} 
 table td{font-size:0.88rem;color:#111827;}
:root{--title-size:clamp(1.75rem,2.8vw,2.35rem);--subtitle-size:1rem;--body-size:0.95rem;--line:1.6;--heading-weight:700;--label-weight:600;}
body{font-size:var(--body-size);line-height:var(--line);} 
.page-title{font-size:var(--title-size);font-weight:var(--heading-weight);letter-spacing:-0.2px;color:var(--text,#0f172a);} 
.page-subtitle{font-size:var(--subtitle-size);font-weight:500;color:var(--muted,#6b7280);line-height:1.6;}
label{font-size:0.85rem;font-weight:var(--label-weight);color:var(--muted,#6b7280);letter-spacing:0.2px;}
input,select,textarea,button{font-size:0.95rem;}
 table th{font-size:0.82rem;font-weight:600;color:#111827;} 
 table td{font-size:0.88rem;color:#111827;}
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --amount-size:1.4rem;
  --accent:#007AFF;
  --glass:#ffffff;
  --stroke:rgba(0,0,0,0.06);
  --soft-shadow:none;
  --radius:12px;
  --text:#0f172a;
  --muted:#6b7280;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
}

body{
  font-family:var(--font);
  min-height:100vh;
  display:block;
  background:#f5f5f7;
  color:var(--text);
  padding:32px 20px;
}

body,button,input,select,textarea,table,th,td,label,p,h1,h2,h3,h4,h5,h6{
  font-family:var(--font);
}

.card{
  width:100%;
  max-width:920px;
  padding:40px;
  border-radius:12px;
  background:var(--glass);
  border:1px solid var(--stroke);
  box-shadow:var(--soft-shadow);
  transition:all .2s ease;
}

/* ================== HEADER OPTIMIZUAR ================== */
.header{
  text-align:left;
  margin-bottom:40px;
  user-select:none;
  -webkit-user-select:none;
}
.header h1{
  font-size:clamp(1.8rem,3vw,2.3rem);
  font-weight:800;
  letter-spacing:-0.5px;
}
.header p{
  margin-top:8px;
  font-size:clamp(0.9rem,1.2vw,1rem);
  color:#6e6e73;
}

.input-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:35px;
  margin-bottom:20px;
}

.input-group{position:relative;}
.input-group label{
  font-size:0.8rem;
  font-weight:600;
  letter-spacing:.5px;
  color:#6e6e73;
  margin-bottom:8px;
  display:block;
}
.input-group input{
  width:100%;
  height:46px;
  padding:10px 12px;
  border:1px solid rgba(15,23,42,0.08);
  border-radius:12px;
  background:#f4f5f7;
  font-size:var(--amount-size);
  font-weight:600;
  transition:all .3s ease;
}
.input-group input:focus{
  outline:none;
  border-color:rgba(0,122,255,0.6);
  box-shadow:0 0 0 3px rgba(0,122,255,0.12);
}
.range-wrap{
  margin-top:10px;
}
.range-card{
  background:transparent;
  border-radius:0;
  padding:0;
  box-shadow:none;
  border:none;
}
.ios-slider{
  -webkit-appearance:none;
  width:100%;
  height:6px;
  border-radius:5px;
  background:#e5e5e5;
  outline:none;
  cursor:pointer;
  transition:background 0.2s;
}
.ios-slider::-webkit-slider-runnable-track{
  height:6px;
  border-radius:5px;
  background:transparent;
}
.ios-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:28px;
  height:28px;
  background:#ffffff;
  border-radius:50%;
  box-shadow:0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.05);
  border:0.5px solid rgba(0,0,0,0.04);
  cursor:pointer;
  transition:transform 0.1s ease;
  margin-top:-11px;
}
.ios-slider::-webkit-slider-thumb:active{
  transform:scale(1.1);
}
.ios-slider::-moz-range-track{
  height:6px;
  border-radius:5px;
  background:#e5e5e5;
}
.ios-slider::-moz-range-thumb{
  width:28px;
  height:28px;
  background:#ffffff;
  border-radius:50%;
  box-shadow:0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.05);
  border:none;
  cursor:pointer;
}
.ios-slider::-moz-focus-outer{
  border:0;
}
.range-scale{
  display:none;
}
.warning{
  color:#d12f2f;
  font-size:0.8rem;
  margin-top:4px;
  position:absolute;
  left:0;
  bottom:-18px;
}

.results-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.result-card{
  padding:24px;
  border-radius:12px;
  background:var(--glass);
  border:1px solid var(--stroke);
  box-shadow:var(--soft-shadow);
  cursor:pointer;
  transition:all .2s ease;
}
.result-card:hover{
  transform:translateY(-2px);
  box-shadow:0 1px 2px rgba(15,23,42,0.08);
}
.result-label{
  font-size:0.75rem;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#86868b;
  margin-bottom:12px;
}
.result-value{
  font-size:var(--amount-size);
  font-weight:800;
  letter-spacing:-1px;
  opacity:0;
  transform:scale(.96);
  transition:all .5s cubic-bezier(.4,0,.2,1);
}
.result-card.show .result-value{
  opacity:1;
  transform:scale(1);
}

.details{
  margin-top:18px;
  border-top:1px solid #e5e5ea;
  padding-top:12px;
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
}
.result-card.active .details{max-height:220px;}
.detail-row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:.9rem;
  color:#3a3a3c;
}

@media (prefers-reduced-motion: reduce){
  *{
    transition:none !important;
    animation:none !important;
  }
}

@media (max-width:720px){
  .card{padding:28px 20px;}
  .header h1{font-size:2rem;}
  .header p{font-size:1rem;}
}

/* FINAL TYPE SYSTEM */
:root{
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
  --title-size:clamp(1.7rem,2.3vw,2.12rem);
  --subtitle-size:0.98rem;
  --body-size:0.95rem;
  --line:1.58;
  --heading-weight:700;
  --subtitle-weight:500;
  --space-title-subtitle:10px;
  --space-intro-content:28px;
}
body,button,input,select,textarea,table,th,td,label,p,h1,h2,h3,h4,h5,h6{
  font-family:var(--font) !important;
}
body{
  font-size:var(--body-size) !important;
  line-height:var(--line) !important;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.page-title,
.header h1{
  font-size:var(--title-size) !important;
  font-weight:var(--heading-weight) !important;
  letter-spacing:-0.026em !important;
  line-height:1.14 !important;
  margin:0 !important;
  color:var(--text,#0f172a) !important;
}
.page-subtitle,
.header p{
  font-size:var(--subtitle-size) !important;
  font-weight:var(--subtitle-weight) !important;
  line-height:1.62 !important;
  color:var(--muted,#6b7280) !important;
  margin:var(--space-title-subtitle) 0 0 0 !important;
  max-width:760px !important;
}
.header{
  margin-bottom:var(--space-intro-content) !important;
}
.header,
.card{
  max-width:920px;
  margin-left:auto;
  margin-right:auto;
}
.card,
.result-card{
  box-shadow:none !important;
  border-radius:12px !important;
}
.card{
  padding:28px !important;
}

/* UNIFIED PAGE SPACING */
:root{--page-padding:24px;--content-max:980px;}
body{padding:var(--page-padding) !important;}
.max-w-6xl.mx-auto,
.max-w-6xl,
.container,
.wrap,
.header,
.card{
  max-width:var(--content-max) !important;
  margin-left:0 !important;
  margin-right:0 !important;
}</style>
</head>
<body>

<div class="header">
  <h1 class="page-title">LLOGARITES PAGE</h1>
  <p class="page-subtitle">Sherben per te llogaritur: Pagen nga bruto ne neto, dhe bonusin nga bruto ne neto, pas dt 1 janar 2026</p>
</div>

<div class="card">
  <div class="input-grid">
    <div class="input-group">
      <label for="paga">Paga Bruto</label>
      <input type="number" id="paga" value="160000" min="0" step="100" inputmode="numeric" aria-describedby="pagaWarning">
      <div class="warning" id="pagaWarning"></div>
    </div>
    <div class="input-group">
      <label for="bonus">Bonus</label>
      <input type="number" id="bonus" value="0" min="0" step="100" inputmode="numeric" aria-describedby="bonusWarning">
      <div class="warning" id="bonusWarning"></div>
    </div>
  </div>

  <div class="results-grid">
    <div class="result-card">
      <div class="result-label">Paga Neto</div>
      <div class="result-value" id="pagaNeto" aria-live="polite" aria-atomic="true">0</div>
      <div class="details">
        <div class="detail-row"><span>TAP</span><span id="tapPaga"></span></div>
        <div class="detail-row"><span>Sig. Shoq.</span><span id="sigPagaSo"></span></div>
        <div class="detail-row"><span>Sig. Shend.</span><span id="sigPagaSh"></span></div>
      </div>
    </div>

    <div class="result-card">
      <div class="result-label">Bonus</div>
      <div class="result-value" id="bonusNeto" aria-live="polite" aria-atomic="true">0</div>
      <div class="details">
        <div class="detail-row"><span>TAP</span><span id="tapBonus"></span></div>
        <div class="detail-row"><span>Sig. Shoq.</span><span id="sigBonusSo"></span></div>
        <div class="detail-row"><span>Sig. Shend.</span><span id="sigBonusSh"></span></div>
      </div>
    </div>

    <div class="result-card">
      <div class="result-label">Total Neto</div>
      <div class="result-value" id="totalNeto" aria-live="polite" aria-atomic="true">0</div>
      <div class="details">
        <div class="detail-row"><span>TAP Total</span><span id="tapTotal"></span></div>
        <div class="detail-row"><span>Sig. Shoq. Total</span><span id="sigTotalSo"></span></div>
        <div class="detail-row"><span>Sig. Shend. Total</span><span id="sigTotalSh"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
function f(v){return v.toLocaleString("en-US",{maximumFractionDigits:0});}

function animateValue(id,value){
  let el=document.getElementById(id),start=0,duration=500,startTime=null;
  function step(timestamp){
    if(!startTime)startTime=timestamp;
    let progress=Math.min((timestamp-startTime)/duration,1);
    el.innerHTML=f(Math.floor(progress*value));
    if(progress<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function TAP(x){
  if(x<=50000)return 0;
  if(x<=60000)return (x-35000)*0.13;
  if(x<=200000)return (x-30000)*0.13;
  return 22100+(x-200000)*0.23;
}
function SigSh(x){ return x*0.017; }
function SigSo(x){ return (x<186416?x:186416)*0.095; }

let timer;
function calcDebounced(){ clearTimeout(timer); timer=setTimeout(calc,150); }

function calc(){
  let paga=parseFloat(document.getElementById("paga").value)||0;
  let bonus=parseFloat(document.getElementById("bonus").value)||0;

  // Kontrollo per vlera negative dhe paralajmerim
  let pagaWarning=document.getElementById("pagaWarning");
  let bonusWarning=document.getElementById("bonusWarning");
  pagaWarning.textContent='';
  bonusWarning.textContent='';

  if(paga<0){ paga=0; document.getElementById("paga").value=0; }
  if(bonus<0){ bonus=0; document.getElementById("bonus").value=0; }

  if(paga<50000){ pagaWarning.textContent="âš  Pas 1 Janar 2026, paga minimale eshte 50,000 Lek"; }

  let totalBruto=paga+bonus;

  let tapPaga=TAP(paga);
  let tapTotal=TAP(totalBruto);
  let tapBonus=tapTotal-tapPaga;

  let sigPagaSh=SigSh(paga);
  let sigTotalSh=SigSh(totalBruto);
  let sigBonusSh=sigTotalSh-sigPagaSh;

  let sigPagaSo=SigSo(paga);
  let sigTotalSo=SigSo(totalBruto);
  let sigBonusSo=sigTotalSo-sigPagaSo;

  let pagaNeto=paga-(tapPaga+sigPagaSh+sigPagaSo);
  let bonusNeto=bonus-(tapBonus+sigBonusSh+sigBonusSo);
  let totalNeto=pagaNeto+bonusNeto;

  animateValue("pagaNeto",pagaNeto);
  animateValue("bonusNeto",bonusNeto);
  animateValue("totalNeto",totalNeto);

  document.querySelectorAll('.result-card').forEach(c=>{ c.classList.add('show'); });

  document.getElementById("tapPaga").innerHTML=f(tapPaga);
  document.getElementById("sigPagaSo").innerHTML=f(sigPagaSo);
  document.getElementById("sigPagaSh").innerHTML=f(sigPagaSh);

  document.getElementById("tapBonus").innerHTML=f(tapBonus);
  document.getElementById("sigBonusSo").innerHTML=f(sigBonusSo);
  document.getElementById("sigBonusSh").innerHTML=f(sigBonusSh);

  document.getElementById("tapTotal").innerHTML=f(tapTotal);
  document.getElementById("sigTotalSo").innerHTML=f(sigTotalSo);
  document.getElementById("sigTotalSh").innerHTML=f(sigTotalSh);
}

document.querySelectorAll('.result-card').forEach(card=>{
  card.addEventListener('click',()=>card.classList.toggle('active'));
});

const pagaInput=document.getElementById("paga");
const pagaRange=document.getElementById("pagaRange");
const bonusInput=document.getElementById("bonus");
const bonusRange=document.getElementById("bonusRange");

function updateRangeFill(rangeEl,value){
  const min=Number(rangeEl.min);
  const max=Number(rangeEl.max);
  const percent=((value-min)/(max-min))*100;
  rangeEl.style.background=`linear-gradient(90deg,#007AFF ${percent}%, #E5E5E5 ${percent}%)`;
}

if(pagaRange){
  pagaRange.value=pagaInput.value;
  updateRangeFill(pagaRange,Number(pagaRange.value));
  pagaRange.addEventListener('input',()=>{
    pagaInput.value=pagaRange.value;
    updateRangeFill(pagaRange,Number(pagaRange.value));
    calcDebounced();
  });
  pagaInput.addEventListener('input',()=>{
    const v=Math.min(300000,Math.max(50000,parseFloat(pagaInput.value)||0));
    pagaRange.value=v;
    updateRangeFill(pagaRange,v);
    calcDebounced();
  });
}else{
  pagaInput.addEventListener('input',calcDebounced);
}

if(bonusRange){
  bonusRange.value=bonusInput.value;
  updateRangeFill(bonusRange,Number(bonusRange.value));
  bonusRange.addEventListener('input',()=>{
    bonusInput.value=bonusRange.value;
    updateRangeFill(bonusRange,Number(bonusRange.value));
    calcDebounced();
  });
  bonusInput.addEventListener('input',()=>{
    const v=Math.min(100000,Math.max(0,parseFloat(bonusInput.value)||0));
    bonusRange.value=v;
    updateRangeFill(bonusRange,v);
    calcDebounced();
  });
}else{
  bonusInput.addEventListener('input',calcDebounced);
}

calc();

["paga","bonus"].forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener("focus",()=>el.select());
  el.addEventListener("click",()=>el.select());
});

["pagaNeto","bonusNeto","totalNeto"].forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener("click",()=>{
    const range=document.createRange();
    range.selectNodeContents(el);
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
});
</script>
</body>
</html>
