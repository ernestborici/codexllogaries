<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LLOGARITES - loan, interest, and salary calculators.">

<title>LLOGARITES</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://unpkg.com/lucide@latest" defer></script>

<style>

:root{
--ios-blue:#007AFF;
--ios-bg:#F2F2F7;
--ios-card:rgba(255,255,255,0.85);
--text:#000;
--transition:.35s cubic-bezier(.25,1,.5,1);
--app-bg:
radial-gradient(circle at 10% 10%, rgba(0,122,255,0.12) 0%, transparent 45%),
radial-gradient(circle at 90% 0%, rgba(99,102,241,0.10) 0%, transparent 40%),
linear-gradient(180deg,#f8fafc 0%, #eef2ff 100%);
--glass:rgba(255,255,255,0.72);
--shadow-soft:0 18px 40px rgba(15,23,42,0.08);
--shadow-hard:0 8px 20px rgba(15,23,42,0.12);
--radius-lg:22px;
--radius-pill:999px;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--app-bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

header{
background:var(--glass);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
height:68px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
border-bottom:1px solid rgba(2,6,23,0.06);
position:sticky;
top:0;
z-index:100;
box-shadow:var(--shadow-soft);
}

.header-logo-container{
position:absolute;
left:50%;
transform:translateX(-50%);
cursor:pointer;
display:flex;
align-items:center;
}

.header-logo-full{
height:30px;
max-width:180px;
object-fit:contain;
}

.menu-btn{
background:none;
border:none;
color:var(--ios-blue);
cursor:pointer;
padding:8px;
display:flex;
align-items:center;
}

.menu-btn:focus-visible,
.nav-btn:focus-visible,
.menu-item:focus-visible{
outline:2px solid var(--ios-blue);
outline-offset:2px;
}

/* TOP NAV */

.top-nav{
display:flex;
justify-content:center;
gap:10px;
background:var(--glass);
border-bottom:1px solid rgba(2,6,23,0.06);
height:56px;
align-items:center;
backdrop-filter:blur(14px);
position:sticky;
top:68px;
z-index:90;
}

.nav-btn{
background:none;
border:none;
font-size:14px;
font-weight:600;
color:#64748b;
cursor:pointer;
position:relative;
letter-spacing:.2px;
padding:10px 16px;
border-radius:var(--radius-pill);
transition:var(--transition);
}

.nav-btn.active{
color:var(--ios-blue);
font-weight:700;
background:rgba(0,122,255,0.12);
}

.nav-btn.active::after{
content:none;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:var(--ios-bg);
z-index:200;
transition:var(--transition);
display:flex;
flex-direction:column;
border-left:.5px solid rgba(0,0,0,0.1);
box-shadow:-20px 0 40px rgba(0,0,0,0.08);
}

.sidebar.active{
right:0;
}

.sidebar-header{
padding:50px 20px 20px;
}

.sidebar-menu{
flex:1;
padding:15px;
overflow-y:auto;
}

.menu-group{
background:white;
border-radius:12px;
margin-bottom:18px;
overflow:hidden;
border:.5px solid rgba(0,0,0,0.05);
}

.menu-item{
display:flex;
align-items:center;
width:100%;
padding:12px 15px;
border:none;
background:none;
font-size:16px;
cursor:pointer;
gap:12px;
border-bottom:.5px solid #F2F2F7;
}

.menu-item i{
color:var(--ios-blue);
width:20px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
z-index:150;
transition:.3s;
backdrop-filter:blur(3px);
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* MAIN */

main{
flex:1;
background:white;
overflow:hidden;
position:relative;
border-top-left-radius:var(--radius-lg);
border-top-right-radius:var(--radius-lg);
box-shadow:var(--shadow-hard);
margin:12px 12px 0 12px;
}

.page{
display:none;
width:100%;
height:100%;
}

.page.active{
display:block;
}

iframe{
width:100%;
height:100%;
border:none;
border-radius:var(--radius-lg);
}

.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
border-top:.5px solid rgba(0,0,0,0.05);
}

@media (prefers-reduced-motion: reduce){
*{
transition:none !important;
animation:none !important;
}
}

@media (max-width:720px){
header{height:64px;}
.top-nav{top:64px;height:52px;}
.nav-btn{font-size:13px;padding:9px 12px;}
main{margin:10px 10px 0 10px;}
}

@media (min-width:980px){
main{margin:16px 16px 0 16px;}
}

</style>
</head>

<body>

<header>

<div style="width:40px"></div>

<div class="header-logo-container" onclick="reloadApp()" role="button" tabindex="0" aria-label="Reload app">
<img src="logo-full.png" class="header-logo-full" alt="LLOGARITES" decoding="async">
</div>

<button class="menu-btn" type="button" onclick="toggleMenu()" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
<i data-lucide="menu"></i>
</button>

</header>


<nav class="top-nav" aria-label="Primary">

<button class="nav-btn active" type="button" data-page="home" onclick="showPage('home',this)" aria-current="page">
KREDI
</button>

<button class="nav-btn" type="button" data-page="produktet" onclick="showPage('produktet',this)">
INTERESA
</button>

<button class="nav-btn" type="button" data-page="paga" onclick="showPage('paga',this)">
PAGA
</button>

</nav>


<div class="overlay" id="overlay" onclick="toggleMenu()" aria-hidden="true"></div>


<aside class="sidebar" id="sidebar" aria-hidden="true" aria-labelledby="sidebar-title">

<div class="sidebar-header">
<h3 id="sidebar-title">MENU</h3>
<p>Financë & Software</p>
</div>

<div class="sidebar-menu">

<div class="menu-group">

<button class="menu-item" type="button" onclick="showPage('home')">
<i data-lucide="calculator"></i>
Llogaritës Kredie
</button>

<button class="menu-item" type="button" onclick="showPage('produktet')">
<i data-lucide="bar-chart-3"></i>
Produktet & Interesat
</button>

<button class="menu-item" type="button" onclick="showPage('paga')">
<i data-lucide="banknote"></i>
Paga Bruto/Neto
</button>

</div>

<div class="menu-group">

<button class="menu-item" type="button" onclick="reloadApp()">
<i data-lucide="refresh-cw"></i>
Update
</button>

</div>

<div class="menu-group">

<button class="menu-item" type="button" onclick="window.location.href='tel:+355697788108'">
<i data-lucide="phone-call"></i>
Kontakti Direkt
</button>

<button class="menu-item" type="button" onclick="window.location.href='mailto:ernest.borici@gmail.com'">
<i data-lucide="mail"></i>
Sugjero një përmirësim
</button>

</div>

<div class="menu-group">

<button class="menu-item" type="button" onclick="showPage('about')">
<i data-lucide="info"></i>
Rreth Nesh
</button>

<button class="menu-item" type="button" onclick="showPage('privacy')">
<i data-lucide="shield"></i>
Privacy Policy
</button>

</div>

</div>

<div class="sidebar-footer">
2026 <b>Ernest Boriçi</b><br>
© All rights reserved.
</div>

</aside>


<main>

<section id="home" class="page" hidden aria-hidden="true"></section>
<section id="produktet" class="page" hidden aria-hidden="true"></section>
<section id="paga" class="page" hidden aria-hidden="true"></section>
<section id="about" class="page" hidden aria-hidden="true"></section>
<section id="privacy" class="page" hidden aria-hidden="true"></section>

</main>


<script>

window.addEventListener('DOMContentLoaded',()=>{
if(window.lucide && typeof lucide.createIcons==='function'){
lucide.createIcons()
}
})

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')
const logoBtn=document.querySelector('.header-logo-container')

logoBtn.addEventListener('keydown',e=>{
if(e.key==='Enter'||e.key===' '){
e.preventDefault()
reloadApp()
}
})

function toggleMenu(){

const isOpen=sidebar.classList.toggle('active')
overlay.classList.toggle('active',isOpen)
sidebar.setAttribute('aria-hidden',String(!isOpen))
overlay.setAttribute('aria-hidden',String(!isOpen))
document.querySelector(".menu-btn").setAttribute("aria-expanded",String(isOpen))

}

function reloadApp(){

location.reload()

}

/* MAIN NAVIGATION */

function showPage(pageId,element){

if(sidebar.classList.contains('active')){
toggleMenu()
}

/* aktivizo tab sipër */

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.classList.remove('active')
btn.removeAttribute('aria-current')
})

const nav=document.querySelector(`.nav-btn[data-page="${pageId}"]`)
if(nav){
nav.classList.add('active')
nav.setAttribute('aria-current','page')
}

if(element && element.classList.contains('nav-btn')){
element.classList.add('active')
element.setAttribute('aria-current','page')
}

/* shfaq faqen */

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active')
page.setAttribute('aria-hidden','true')
page.hidden=true
})

const target=document.getElementById(pageId)

if(target){
target.classList.add('active')
target.setAttribute('aria-hidden','false')
target.hidden=false
}

/* lazy load */

if(target.innerHTML.trim()===""){

const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
about:"About.html",
privacy:"Privacy.html"
}

const titleMap={
home:"Llogarites Kredie",
produktet:"Produktet & Interesat",
paga:"Paga Bruto/Neto",
about:"Rreth Nesh",
privacy:"Privacy Policy"
}

target.innerHTML=`<iframe src="${srcMap[pageId]}" title="${titleMap[pageId]||'Content'}" loading="lazy"></iframe>`

}

}

window.onload=()=>{
showPage("home")
}

/* PULL TO REFRESH */

let touchStart=0

document.addEventListener("touchstart",e=>{
touchStart=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let touchEnd=e.changedTouches[0].clientY

if(touchEnd-touchStart>120){
reloadApp()
}

})

</script>

</body>
</html>
