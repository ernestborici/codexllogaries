<html lang="sq">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="icon" type="image/png" href="icon.png">

<style>
/* FONT UNIFY */
*{font-family:var(--font) !important;}

/* TYPOGRAPHY */
:root{--title-size:clamp(1.85rem,3vw,2.45rem);--subtitle-size:1.02rem;--body-size:0.96rem;--line:1.55;--heading-weight:700;--label-weight:600;--title-tracking:-0.3px;--label-tracking:0.2px;}
body{font-size:var(--body-size);line-height:var(--line);} 
.page-title{font-size:var(--title-size);font-weight:var(--heading-weight);letter-spacing:var(--title-tracking);color:var(--text,#0f172a);} 
.page-subtitle{font-size:var(--subtitle-size);font-weight:500;color:var(--muted,#6b7280);line-height:1.6;}
label{font-size:0.82rem;font-weight:var(--label-weight);color:var(--muted,#6b7280);letter-spacing:var(--label-tracking);} 
input,select,textarea,button{font-size:0.95rem;}
 table th{font-size:0.8rem;font-weight:600;letter-spacing:0.2px;color:#111827;} 
 table td{font-size:0.88rem;color:#111827;}
:root{--title-size:clamp(1.75rem,2.8vw,2.35rem);--subtitle-size:1rem;--body-size:0.95rem;--line:1.6;--heading-weight:700;--label-weight:600;}
body{font-size:var(--body-size);line-height:var(--line);} 
.page-title{font-size:var(--title-size);font-weight:var(--heading-weight);letter-spacing:-0.2px;color:var(--text,#0f172a);} 
.page-subtitle{font-size:var(--subtitle-size);font-weight:500;color:var(--muted,#6b7280);line-height:1.6;}
label{font-size:0.85rem;font-weight:var(--label-weight);color:var(--muted,#6b7280);letter-spacing:0.2px;}
input,select,textarea,button{font-size:0.95rem;}
 table th{font-size:0.82rem;font-weight:600;color:#111827;} 
 table td{font-size:0.88rem;color:#111827;}
:root{
--ios-blue:#007AFF;
--ios-bg:#f5f5f7;
--ios-card:#ffffff;
--text:#0f172a;
--transition:.2s ease;
--app-bg:#f5f5f7;
--glass:#ffffff;
--shadow-soft:none;
--shadow-hard:none;
--radius-lg:12px;
--radius-pill:10px;
--surface:#ffffff;
--stroke:rgba(0,0,0,0.06);
--muted:#6b7280;
--sidebar-width:260px;
--header-height:68px;
--actions-height:56px;
--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
--font-ui:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:var(--font);
background:var(--app-bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

body,button,input,select,textarea{
font-family:var(--font);
}

.app-shell{
width:min(1120px,100%);
height:calc(100vh - 28px);
margin:14px auto;
background:var(--surface);
border:1px solid var(--stroke);
border-radius:12px;
box-shadow:var(--shadow-hard);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

header{
background:var(--surface);
height:var(--header-height);
display:flex;
align-items:center;
justify-content:flex-start;
gap:12px;
padding:0 18px;
border-bottom:1px solid var(--stroke);
position:sticky;
top:0;
z-index:100;
box-shadow:none;
}

.header-logo-full{
height:34px;
max-width:200px;
object-fit:contain;
}

.header-actions{
display:grid;
grid-template-columns:var(--sidebar-width) 1fr;
align-items:center;
gap:10px;
padding:8px 18px;
border-bottom:1px solid var(--stroke);
background:var(--surface);
position:sticky;
top:var(--header-height);
z-index:95;
height:var(--actions-height);
}

.header-left{
display:flex;
align-items:center;
justify-content:flex-start;
padding-left:14px;
gap:10px;
}

.header-right{
display:flex;
align-items:center;
justify-content:flex-start;
}

.header-logo-container{
position:static;
transform:none;
cursor:pointer;
display:flex;
align-items:center;
}

.header-logo-full{
height:36px;
max-width:210px;
object-fit:contain;
}

.menu-btn{
background:none;
border:none;
color:var(--ios-blue);
cursor:pointer;
padding:8px;
display:flex;
align-items:center;
border-radius:8px;
transition:var(--transition);
position:static;
background:rgba(15,23,42,0.04);
width:36px;
height:36px;
justify-content:center;
}

.menu-btn:hover{
background:rgba(15,23,42,0.08);
}

.menu-label{
font-family:var(--font-ui) !important;
font-size:var(--subtitle-size);
font-weight:600;
letter-spacing:.2px;
color:var(--muted);
}

.menu-btn svg{
transition:transform .2s ease;
}

.menu-btn.open svg{
transform:translateY(-2px);
}

.menu-btn:not(.open) svg{
transform:translateY(2px);
}

.menu-btn:focus-visible,
.nav-btn:focus-visible,
.menu-item:focus-visible{
outline:2px solid var(--ios-blue);
outline-offset:2px;
}

/* TOP NAV */

.top-nav{
display:flex;
justify-content:flex-start;
gap:6px;
background:transparent;
border-bottom:none;
height:auto;
align-items:center;
position:static;
z-index:90;
padding:0;
}

.nav-btn{
background:none;
border:none;
font-size:14px;
font-weight:600;
color:var(--muted);
cursor:pointer;
position:relative;
letter-spacing:.2px;
padding:10px 16px;
border-radius:8px;
transition:var(--transition);
}

/* FONT: MENU + KREDI/PAGA */
.menu-item,
.nav-btn{
font-family:var(--font-ui) !important;
font-weight:600;
font-size:var(--subtitle-size);
letter-spacing:.2px;
}

/* HEADER / SUBHEADER WEIGHTS */
.page-title{
font-family:var(--font-ui) !important;
font-weight:800;
}
.page-subtitle{
font-family:var(--font-ui) !important;
font-weight:600;
font-size:var(--subtitle-size);
}

.nav-btn.active{
color:var(--ios-blue);
font-weight:700;
background:rgba(11,95,255,0.10);
}

.nav-btn:hover{
background:rgba(15,23,42,0.06);
}

.nav-btn.active::after{
content:none;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:calc(var(--header-height) + var(--actions-height));
left:0;
right:auto;
width:var(--sidebar-width);
height:calc(100% - var(--header-height) - var(--actions-height));
background:var(--surface);
z-index:200;
transition:none;
display:flex;
flex-direction:column;
border-right:1px solid var(--stroke);
box-shadow:none;
}

.sidebar.active{
}

.sidebar-header{
padding:24px 20px 14px;
border-bottom:1px solid rgba(15,23,42,0.06);
color:#6b7280;
font-size:12px;
letter-spacing:.18em;
text-transform:uppercase;
}

.sidebar-menu{
flex:1;
padding:12px 14px;
overflow-y:auto;
transition:transform .2s ease, opacity .2s ease;
}

.sidebar:not(.active) .sidebar-menu{
transform:translateY(-10px);
opacity:0;
pointer-events:none;
}

.sidebar.active .sidebar-menu{
transform:translateY(0);
opacity:1;
pointer-events:auto;
}

.menu-group{
background:transparent;
border-radius:6px;
margin-bottom:12px;
overflow:hidden;
border:none;
box-shadow:none;
}

.menu-item{
display:flex;
align-items:center;
width:100%;
padding:10px 12px;
border:none;
background:none;
font-size:14px;
cursor:pointer;
gap:12px;
border-bottom:1px solid rgba(15,23,42,0.04);
transition:var(--transition);
color:#0f172a;
border-radius:8px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.menu-item i{
color:#0f172a;
width:20px;
}


.submenu{
display:none;
padding:4px 6px 8px 6px;
}

.submenu.open{
display:block;
}

.submenu .menu-item{
font-size:13px;
padding:8px 10px;
border-bottom:none;
color:#0f172a;
border-radius:8px;
}

.submenu .menu-item i{
color:#0f172a;
}

.submenu-chevron{
margin-left:auto;
color:#0f172a;
}

.menu-item:hover{
background:rgba(15,23,42,0.04);
}

.menu-item.active{
background:rgba(11,95,255,0.10);
color:var(--ios-blue);
font-weight:700;
}

.menu-item.active i{
color:var(--ios-blue);
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
opacity:0;
visibility:hidden;
z-index:150;
transition:.3s;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* MAIN */

main{
flex:1;
background:var(--surface);
overflow:hidden;
position:relative;
border-top:1px solid var(--stroke);
margin:0;
}

.main-layout{
display:flex;
height:100%;
gap:16px;
}

.content-area{
flex:1;
min-width:0;
height:100%;
}

.page{
display:none;
width:100%;
height:100%;
}

.page.active{
display:block;
}

iframe{
width:100%;
height:100%;
border:none;
border-radius:0;
}


.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
border-top:.5px solid rgba(0,0,0,0.05);
}

@media (prefers-reduced-motion: reduce){
*{
transition:none !important;
animation:none !important;
}
}

@media (max-width:720px){
header{height:64px;flex-wrap:wrap;gap:8px;}
:root{--actions-height:52px;}
.header-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:nowrap;
  padding:8px 14px;
}
  .header-left{flex:0 0 auto;order:2;}
  .header-right{flex:1 1 auto;order:1;}
  .top-nav{justify-content:flex-start;}
  .sidebar{top:calc(64px + var(--actions-height));height:calc(100% - 64px - var(--actions-height));}
  .nav-btn{font-size:13px;padding:8px 12px;}
  .menu-btn{width:34px;height:34px;}
  .menu-label{display:none;}
  main{margin:10px 10px 0 10px;}
  }

@media (min-width:980px){
main{margin:16px 16px 0 16px;}
}

@media (min-width:900px){
.overlay{
display:none;
}
main{
margin-left:var(--sidebar-width);
width:calc(100% - var(--sidebar-width));
}
}

@media (max-width:899px){
  .sidebar{
    left:auto;
    right:0;
    width:min(340px,55vw);
    border-right:none;
    border-left:1px solid var(--stroke);
    border-top:1px solid var(--stroke);
    transition:transform .28s cubic-bezier(.22,1,.36,1), opacity .2s ease;
    transform:translateX(100%);
    opacity:0;
    pointer-events:none;
    border-radius:16px 0 0 16px;
    box-shadow:0 18px 40px rgba(15,23,42,0.18);
    background:rgba(255,255,255,0.98);
  }
  .sidebar.active{
    transform:translateX(0);
    opacity:1;
    pointer-events:auto;
  }
  .sidebar-menu{
    transform:none;
    opacity:1;
    pointer-events:auto;
    padding:10px 12px;
  }
  .sidebar:not(.active) .sidebar-menu{
    transform:none;
    opacity:1;
    pointer-events:auto;
  }
  .menu-btn{
    margin-left:0;
  }
  .menu-item{
    padding:12px 12px;
    border-radius:10px;
    font-size:0.93rem;
  }
  .menu-item i{
    width:18px;
  }
  .overlay{
    background:rgba(15,23,42,0.35);
  }
  .main-layout{
    display:block;
  }
}

/* TYPO RESET (UNIFIED) */
:root{
  --font-ui:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
  --title-size:clamp(1.74rem,2.4vw,2.3rem);
  --subtitle-size:0.95rem;
  --body-size:0.95rem;
  --line:1.6;
  --ls-title:-0.012em;
  --ls-sub:0.15px;
}
html,body{font-family:var(--font-ui)!important;}
body,button,input,select,textarea,table,th,td,label,p,h1,h2,h3,h4,h5,h6{font-family:var(--font-ui)!important;}
body{font-size:var(--body-size)!important;line-height:var(--line)!important;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
.page-title{font-size:var(--title-size)!important;font-weight:700!important;letter-spacing:var(--ls-title)!important;line-height:1.15!important;margin:0!important;}
.page-subtitle{font-size:var(--subtitle-size)!important;font-weight:400!important;letter-spacing:var(--ls-sub)!important;line-height:1.6!important;color:#6b7280!important;max-width:720px;margin:8px 0 0 0!important;}
.page-intro{margin-bottom:22px!important;}
label{font-size:0.84rem!important;font-weight:600!important;letter-spacing:0.2px!important;}
.menu-item,.nav-btn{font-size:var(--subtitle-size)!important;font-weight:500!important;letter-spacing:var(--ls-sub)!important;}
.menu-item.active,.nav-btn.active{font-weight:600!important;}
.menu-label{font-size:var(--subtitle-size)!important;font-weight:500!important;letter-spacing:var(--ls-sub)!important;}</style>
</head>

<script>

window.addEventListener('DOMContentLoaded',()=>{
if(window.lucide && typeof lucide.createIcons==='function'){
lucide.createIcons()
}

const homeMenu=document.querySelector(".menu-item[onclick=\"showPage('home')\"]")
const productsMenu=document.querySelector(".menu-item[onclick=\"showPage('produktet')\"]")
const salaryMenu=document.querySelector(".menu-item[onclick=\"showPage('paga')\"]")
if(homeMenu) homeMenu.childNodes[2].textContent="\nLlogarites Kredie\n"
if(salaryMenu) salaryMenu.childNodes[2].textContent="\nLlogarites Page\n"
if(productsMenu) productsMenu.childNodes[2].textContent="\nProduktet & Interesat\n"
})

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')
const logoBtn=document.querySelector('.header-logo-container')
const menuBtn=document.querySelector('.menu-btn')

logoBtn.addEventListener('keydown',e=>{
if(e.key==='Enter'||e.key===' '){
e.preventDefault()
reloadApp()
}
})

function toggleMenu(){

const isDesktop=window.matchMedia("(min-width: 900px)").matches
const isOpen=sidebar.classList.toggle('active')

if(isDesktop){
document.body.classList.toggle('sidebar-open',isOpen)
sidebar.setAttribute('aria-hidden',String(!isOpen))
document.querySelector(".menu-btn").setAttribute("aria-expanded",String(isOpen))
if(menuBtn) menuBtn.classList.toggle('open',isOpen)
return
}

overlay.classList.toggle('active',isOpen)
sidebar.setAttribute('aria-hidden',String(!isOpen))
overlay.setAttribute('aria-hidden',String(!isOpen))
document.querySelector(".menu-btn").setAttribute("aria-expanded",String(isOpen))
if(menuBtn) menuBtn.classList.toggle('open',isOpen)

}

function toggleAboutMenu(){
const submenu=document.getElementById('about-submenu')
const btn=document.getElementById('about-toggle')
const isOpen=submenu.classList.toggle('open')
submenu.setAttribute('aria-hidden',String(!isOpen))
btn.setAttribute('aria-expanded',String(isOpen))
}

function reloadApp(){

location.reload()

}

/* MAIN NAVIGATION */

function showPage(pageId,element){

if(!window.matchMedia("(min-width: 900px)").matches && sidebar.classList.contains('active')){
toggleMenu()
}

/* aktivizo tab siper */

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.classList.remove('active')
btn.removeAttribute('aria-current')
})

const nav=document.querySelector(`.nav-btn[data-page="${pageId}"]`)
if(nav){
nav.classList.add('active')
nav.setAttribute('aria-current','page')
}

if(element && element.classList.contains('nav-btn')){
element.classList.add('active')
element.setAttribute('aria-current','page')
}

document.querySelectorAll('.menu-item[data-page]').forEach(btn=>{
btn.classList.toggle('active',btn.dataset.page===pageId)
})

/* shfaq faqen */

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active')
page.setAttribute('aria-hidden','true')
page.hidden=true
})

const target=document.getElementById(pageId)

if(target){
target.classList.add('active')
target.setAttribute('aria-hidden','false')
target.hidden=false
}

/* lazy load */

if(target.innerHTML.trim()===""){

const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
direktiva:"Direktiva.html",
formular:"Formulare.html",
["about-app"]:"AboutApp.html",
install:"Install.html",
suggestions:"Sugjerime.html",
contact:"Kontakt.html",
about:"About.html",
privacy:"Privacy.html"
}

const titleMap={
home:"Llogarites Kredie",
produktet:"Produktet & Interesat",
paga:"Llogarites Page",
direktiva:"Direktiva / UB",
formular:"Formulare",
["about-app"]:"Rreth aplikacionit",
install:"Si ta instalojme",
suggestions:"Sugjerime",
contact:"Kontakt",
about:"Rreth Nesh",
privacy:"Privacy & Policy"
}

target.innerHTML=`<iframe src="${srcMap[pageId]}" title="${titleMap[pageId]||'Content'}" loading="lazy"></iframe>`

}

}

window.onload=()=>{
if(window.matchMedia("(min-width: 900px)").matches){
document.body.classList.add('sidebar-open')
sidebar.classList.add('active')
sidebar.setAttribute('aria-hidden','false')
document.querySelector(".menu-btn").setAttribute("aria-expanded","true")
if(menuBtn) menuBtn.classList.add('open')
}
showPage("home")
}

/* PULL TO REFRESH */

let touchStart=0

document.addEventListener("touchstart",e=>{
touchStart=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let touchEnd=e.changedTouches[0].clientY

if(touchEnd-touchStart>120){
reloadApp()
}

})

</script>
