<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulare</title>
<style>
/* FONT UNIFY */
:root{--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;}
*{font-family:var(--font) !important;}
/* TYPOGRAPHY */
:root{--title-size:clamp(1.85rem,3vw,2.45rem);--subtitle-size:1.02rem;--body-size:0.96rem;--line:1.55;--heading-weight:700;--label-weight:600;--title-tracking:-0.3px;--label-tracking:0.2px;}
body{font-size:var(--body-size);line-height:var(--line);} 
.page-title{font-size:var(--title-size);font-weight:var(--heading-weight);letter-spacing:var(--title-tracking);color:var(--text,#0f172a);} 
.page-subtitle{font-size:var(--subtitle-size);font-weight:500;color:var(--muted,#6b7280);line-height:1.6;}
label{font-size:0.82rem;font-weight:var(--label-weight);color:var(--muted,#6b7280);letter-spacing:var(--label-tracking);} 
input,select,textarea,button{font-size:0.95rem;}
 table th{font-size:0.8rem;font-weight:600;letter-spacing:0.2px;color:#111827;} 
 table td{font-size:0.88rem;color:#111827;}
:root{--title-size:clamp(1.75rem,2.8vw,2.35rem);--subtitle-size:1rem;--body-size:0.95rem;--line:1.6;--heading-weight:700;--label-weight:600;}
body{font-size:var(--body-size);line-height:var(--line);} 
.page-title{font-size:var(--title-size);font-weight:var(--heading-weight);letter-spacing:-0.2px;color:var(--text,#0f172a);} 
.page-subtitle{font-size:var(--subtitle-size);font-weight:500;color:var(--muted,#6b7280);line-height:1.6;}
label{font-size:0.85rem;font-weight:var(--label-weight);color:var(--muted,#6b7280);letter-spacing:0.2px;}
input,select,textarea,button{font-size:0.95rem;}
 table th{font-size:0.82rem;font-weight:600;color:#111827;} 
 table td{font-size:0.88rem;color:#111827;}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);
  background:#f5f5f7;
  color:#0f172a;
  padding:24px;
}
body,button,input,select,textarea,table,th,td,label,p,h1,h2,h3,h4,h5,h6{
  font-family:inherit;
}
.card{
  max-width:900px;
  margin:0 auto;
  background:#ffffff;
  border:1px solid rgba(0,0,0,0.06);
  border-radius:12px;
  box-shadow:none;
  padding:24px;
}
h1{font-size:clamp(1.4rem,2.8vw,2rem);margin-bottom:8px;letter-spacing:-0.3px;}
p{color:#6b7280;}

/* FINAL TYPE SYSTEM */
:root{
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
  --title-size:clamp(1.7rem,2.3vw,2.12rem);
  --subtitle-size:0.98rem;
  --body-size:0.95rem;
  --line:1.58;
  --heading-weight:700;
  --subtitle-weight:500;
  --space-title-subtitle:10px;
  --space-intro-content:28px;
}
body,button,input,select,textarea,table,th,td,label,p,h1,h2,h3,h4,h5,h6{
  font-family:var(--font) !important;
}
body{
  font-size:var(--body-size) !important;
  line-height:var(--line) !important;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.page-title{
  font-size:var(--title-size) !important;
  font-weight:var(--heading-weight) !important;
  letter-spacing:-0.026em !important;
  line-height:1.14 !important;
  margin:0 !important;
  color:#0f172a !important;
}
.page-subtitle{
  font-size:var(--subtitle-size) !important;
  font-weight:var(--subtitle-weight) !important;
  line-height:1.62 !important;
  color:#6b7280 !important;
  margin:var(--space-title-subtitle) 0 0 0 !important;
  max-width:760px !important;
}
.page-subtitle + *{
  margin-top:var(--space-intro-content) !important;
}
.card{
  box-shadow:none !important;
  border-radius:12px !important;
}

/* UNIFIED PAGE SPACING */
:root{--page-padding:24px;--content-max:980px;}
body{padding:var(--page-padding) !important;}
.max-w-6xl.mx-auto,
.max-w-6xl,
.container,
.wrap,
.header,
.card{
  max-width:var(--content-max) !important;
  margin-left:0 !important;
  margin-right:0 !important;
}</style>
</head>
<body>
  <div class="card" id="content" style="display:none;">
    <h1 class="page-title">Formulare</h1>
    <p class="page-subtitle">Vend per formularet ose dokumente per aplikim.</p>
  </div>
<script>
(function(){
  const PASS="eborici";
  const content=document.getElementById("content");
  const input=prompt("Shkruaj kodin e aksesit:");
  if(input===PASS){
    content.style.display="block";
  }else{
    document.body.innerHTML="<div class='card'><h1>Access denied</h1><p>Nuk ke akses ne kete faqe.</p></div>";
  }
})();
</script>
</body>
</html>
