<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#f5f5f7;
  color:#0f172a;
  padding:24px;
}
.card{
  max-width:900px;
  margin:0 auto;
  background:#ffffff;
  border:1px solid rgba(0,0,0,0.06);
  border-radius:12px;
  box-shadow:none;
  padding:24px;
}
h1{font-size:clamp(1.4rem,2.8vw,2rem);margin-bottom:8px;letter-spacing:-0.3px;}
p{color:#6b7280;}
</style>
</head>
<body>
  <div class="card" id="content" style="display:none;">
    <h1>Formulare</h1>
    <p>Vend per formularet ose dokumente per aplikim.</p>
  </div>
<script>
(function(){
  const PASS="eborici";
  const content=document.getElementById("content");
  const input=prompt("Shkruaj kodin e aksesit:");
  if(input===PASS){
    content.style.display="block";
  }else{
    document.body.innerHTML="<div class='card'><h1>Access denied</h1><p>Nuk ke akses ne kete faqe.</p></div>";
  }
})();
</script>
</body>
</html>
