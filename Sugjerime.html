<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugjerime</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(900px 500px at 10% -10%, rgba(0,122,255,0.10), transparent 60%),
    radial-gradient(900px 500px at 110% 10%, rgba(0,122,255,0.08), transparent 60%),
    #f2f3f7;
  color:#0f172a;
  padding:24px;
}
.card{
  max-width:900px;
  margin:0 auto;
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:20px;
  box-shadow:0 12px 30px rgba(15,23,42,0.10);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:24px;
}
h1{font-size:clamp(1.4rem,2.8vw,2rem);margin-bottom:8px;letter-spacing:-0.3px;}
p{color:#6b7280;}
</style>
</head>
<body>
  <div class="card">
    <h1>Sugjerime</h1>
    <p>Vend per sugjerime dhe feedback nga perdoruesit.</p>
  </div>
</body>
</html>
