<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy & Policy</title>
<style>
/* FONT UNIFY */
:root{--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","San Francisco",Helvetica,Arial,sans-serif;}
*{font-family:var(--font) !important;}
/* TYPOGRAPHY */
.page-title{font-size:clamp(1.6rem,2.6vw,2.2rem);font-weight:700;letter-spacing:-0.3px;color:var(--text,#0f172a);} 
.page-subtitle{font-size:0.95rem;color:var(--muted,#6b7280);line-height:1.5;}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);
  background:#f5f5f7;
  color:#0f172a;
  padding:24px;
}
body,button,input,select,textarea,table,th,td,label,p,h1,h2,h3,h4,h5,h6{
  font-family:inherit;
}
.card{
  max-width:900px;
  margin:0 auto;
  background:#ffffff;
  border:1px solid rgba(0,0,0,0.06);
  border-radius:12px;
  box-shadow:none;
  padding:24px;
}
h1{font-size:clamp(1.4rem,2.8vw,2rem);margin-bottom:8px;letter-spacing:-0.3px;}
p{color:#6b7280;}
</style>
</head>
<body>
  <div class="card">
    <h1 class="page-title">Privacy & Policy</h1>
    <p class="page-subtitle">Vend per rregullat e privatesise dhe politikat.</p>
  </div>
</body>
</html>
